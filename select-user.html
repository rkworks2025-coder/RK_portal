<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>担当者選択 | RK Works</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="select-user-body">

  <div class="select-user-wrap">
    <img src="icons/icon-192.png" alt="RK Works" class="select-user-logo">
    <h1 class="select-user-title">利用者を選択してください</h1>
    <p class="select-user-sub">選択内容はこの端末に保存されます</p>

    <div class="select-user-list">
      <button class="select-user-btn" data-user="katayama">
        <span class="select-user-icon"><i class="ti ti-user"></i></span>
        <span class="select-user-name">片山用</span>
      </button>
      <button class="select-user-btn" data-user="tojima">
        <span class="select-user-icon"><i class="ti ti-user"></i></span>
        <span class="select-user-name">戸島用</span>
      </button>
    </div>
  </div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script src="shared/user-context.js"></script>
<script>
  document.querySelectorAll(".select-user-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var userId = btn.getAttribute("data-user");
      setCurrentUser(userId);
      window.location.href = "index.html";
    });
  });
</script>
</body>
</html>

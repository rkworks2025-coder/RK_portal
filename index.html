<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#15171a">
<title>RK Works 業務ポータル</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RK Works">

<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="shared/modal.css?v=2">
<link rel="stylesheet" href="shared/no-zoom.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
</head>
<body>

  <div class="portal-wrap">

    <div class="portal-header">
      <img src="icons/icon-32.png" alt="RK Works">
      <div class="portal-header-text">
        <p class="portal-title">業務ポータル</p>
        <p class="portal-sub" id="portal-user-label">アプリを選択してください</p>
      </div>
      <button type="button" id="pw-mode-badge" class="portal-pw-badge">
        <i class="ti ti-key" aria-hidden="true"></i>
        <span class="portal-pw-badge-text-wrap">
          <span id="pw-mode-badge-text">PW1</span>
          <span class="portal-pw-badge-hint">タップで切替可</span>
        </span>
      </button>
    </div>

    <div class="portal-grid">

      <a href="./junkai/" class="portal-card">
        <span class="portal-card-icon icon-junkai"><i class="ti ti-map-pin" aria-hidden="true"></i></span>
        <span class="portal-card-label">巡回</span>
      </a>

      <a href="./yoyaku/" id="card-yoyaku" class="portal-card">
        <span class="portal-card-icon icon-yoyaku"><i class="ti ti-calendar-stats" aria-hidden="true"></i></span>
        <span class="portal-card-label">予約表示</span>
      </a>

      <a href="./jks/" id="card-jks" class="portal-card">
        <span class="portal-card-badge badge-jks">List</span>
        <span class="portal-card-icon icon-jks"><i class="ti ti-list-details" aria-hidden="true"></i></span>
        <span class="portal-card-label">JKS</span>
      </a>

      <a href="./jks2/" id="card-jks2" class="portal-card">
        <span class="portal-card-badge badge-jks2">Map</span>
        <span class="portal-card-icon icon-jks2"><i class="ti ti-map-2" aria-hidden="true"></i></span>
        <span class="portal-card-label">JKS II</span>
      </a>

      <a href="./jisseki/" class="portal-card">
        <span class="portal-card-icon icon-jisseki"><i class="ti ti-report" aria-hidden="true"></i></span>
        <span class="portal-card-label">作業実績</span>
      </a>

      <a href="https://dailycheck.tc-extsys.jp/tcrappsweb/web/tawTop.html" class="portal-card">
        <span class="portal-card-icon icon-tma"><i class="ti ti-external-link" aria-hidden="true"></i></span>
        <span class="portal-card-label">TMA</span>
      </a>

    </div>

    <div class="portal-tma-bookmarklet-row">
      <a href="#" id="tmaMenuBookmarklet" class="portal-tma-bookmarklet" draggable="true">
        <i class="ti ti-apps" aria-hidden="true"></i> TMA用メニュー
      </a>
      <button type="button" id="tmaMenuHelpBtn" class="portal-tma-help-btn" aria-label="使い方">?</button>
    </div>

  </div>

  <div id="tmaMenuHelpModal" class="modal">
    <div class="dialog">
      <h3>TMA用メニューの使い方</h3>
      <p class="dialog-msg">
        「TMA用メニュー」を長押し（PCならドラッグ）してブックマークバーに保存してください。<br><br>
        TMAの画面を開いた状態でこのブックマークをタップすると、ポータルの各アプリへのメニューが浮かんで表示されます。TMAで何ページ進んでいても、そこから直接他のアプリに移動できます。
      </p>
      <div class="tma-confirm-actions">
        <button id="tmaMenuHelpClose" class="btn">閉じる</button>
      </div>
    </div>
  </div>

  <div id="pwModal" class="modal">
    <div class="dialog">
      <h3>PWモードの切り替え</h3>
      <p class="dialog-sub" id="pwModalCurrent">現在: モード1</p>
      <p class="dialog-msg">現在TMAログイン画面で使われているPWを選んでください</p>
      <div class="tma-confirm-actions">
        <button id="pwModalMode1" class="btn btn-ok">--</button>
        <button id="pwModalMode2" class="btn btn-ok">--</button>
      </div>
      <div class="tma-confirm-actions">
        <button id="pwModalCancel" class="btn">キャンセル</button>
      </div>
    </div>
  </div>

<script src="shared/user-context.js?v=2"></script>
<script src="shared/pw-config.js?v=2"></script>
<script>
  (function () {
    var user = getCurrentUser();
    if (!user) {
      window.location.href = "select-user.html";
      return;
    }
    var label = document.getElementById("portal-user-label");
    if (label) {
      label.textContent = user.label + "として利用中";
    }

    // JKS・予約表示・JKS IIは片山用・戸島用でフォルダが分かれているため、
    // 担当者IDに応じてカードのリンク先を切り替える。
    var jksCard = document.getElementById("card-jks");
    if (jksCard && user.id === "tojima") {
      jksCard.setAttribute("href", "./jks/tjm/");
    }

    var yoyakuCard = document.getElementById("card-yoyaku");
    if (yoyakuCard && user.id === "tojima") {
      yoyakuCard.setAttribute("href", "./yoyaku/tjm/");
    }

    var jks2Card = document.getElementById("card-jks2");
    if (jks2Card && user.id === "tojima") {
      jks2Card.setAttribute("href", "./jks2/tjm/");
    }

    var mode = getCurrentPwMode();
    if (!mode) {
      window.location.href = "select-pw-mode.html";
      return;
    }
    updatePwBadge(mode);
    setupTmaMenuBookmarklet(user);

    var btn1 = document.getElementById("pwModalMode1");
    var btn2 = document.getElementById("pwModalMode2");
    if (btn1) btn1.textContent = getPwValueFor(user.id, "mode1") || "--";
    if (btn2) btn2.textContent = getPwValueFor(user.id, "mode2") || "--";
  })();

  // ===== TMA画面上にメニューを浮かせるブックマークレット =====
  // TMAは別オリジンなので、ポータルのJSから直接操作はできない。
  // その代わり、ブックマークレット自身が実行された「その場のページ」に
  // メニューのボタン・ポップアップを注入する形にする。
  // どのURL（片山用/戸島用）を使うかは、このブックマークレットを
  // 保存する時点でのポータルのログインユーザーを元に決め打ちで埋め込む。
  function setupTmaMenuBookmarklet(user) {
    var link = document.getElementById("tmaMenuBookmarklet");
    if (!link) return;

    var isTojima = user && user.id === "tojima";
    var root = "https://rkworks2025-coder.github.io/RK_portal/";
    var items = [
      { label: "TOP",    href: root },
      { label: "巡回",   href: root + "junkai/" },
      { label: "予約",   href: root + (isTojima ? "yoyaku/tjm/" : "yoyaku/") },
      { label: "JKS",    href: root + (isTojima ? "jks/tjm/"    : "jks/") },
      { label: "JKS II", href: root + (isTojima ? "jks2/tjm/"   : "jks2/") },
      { label: "実績",   href: root + "jisseki/" }
    ];

    var payload = JSON.stringify(items);
    var src = "(function(){" +
      "if(document.getElementById('rk-tma-menu-btn')){return;}" +
      "var items=" + payload + ";" +
      "var style=document.createElement('style');" +
      "style.textContent='" +
      "#rk-tma-menu-btn{position:fixed;bottom:16px;right:16px;width:44px;height:44px;" +
      "border-radius:50%;background:#1a1a1e;color:#fff;border:1px solid rgba(255,255,255,.3);" +
      "font-size:20px;z-index:999999;display:flex;align-items:center;justify-content:center;" +
      "box-shadow:0 4px 16px rgba(0,0,0,.4);cursor:pointer;}" +
      "#rk-tma-menu-popup{position:fixed;bottom:68px;right:16px;background:#1a1a1e;" +
      "border:1px solid rgba(255,255,255,.2);border-radius:12px;min-width:150px;" +
      "overflow:hidden;z-index:999999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}" +
      "#rk-tma-menu-popup a{display:block;padding:12px 16px;color:#eee;text-decoration:none;" +
      "font-size:15px;border-bottom:1px solid rgba(255,255,255,.08);}" +
      "#rk-tma-menu-popup a:last-child{border-bottom:none;}" +
      "';" +
      "document.head.appendChild(style);" +
      "var btn=document.createElement('button');" +
      "btn.id='rk-tma-menu-btn';btn.textContent='\\u22EE';" +
      "var popup=document.createElement('div');" +
      "popup.id='rk-tma-menu-popup';" +
      "items.forEach(function(it){" +
      "  var a=document.createElement('a');a.textContent=it.label;a.href=it.href;" +
      "  popup.appendChild(a);" +
      "});" +
      "btn.addEventListener('click',function(){" +
      "  popup.style.display=popup.style.display==='block'?'none':'block';" +
      "});" +
      "document.body.appendChild(popup);" +
      "document.body.appendChild(btn);" +
      "})();";

    link.setAttribute("href", "javascript:" + encodeURIComponent(src));
  }

  var tmaMenuHelpModal = document.getElementById("tmaMenuHelpModal");
  document.getElementById("tmaMenuHelpBtn").addEventListener("click", function () {
    tmaMenuHelpModal.classList.add("show");
  });
  document.getElementById("tmaMenuHelpClose").addEventListener("click", function () {
    tmaMenuHelpModal.classList.remove("show");
  });

  function updatePwBadge(mode) {
    var badgeText = document.getElementById("pw-mode-badge-text");
    var user = getCurrentUser();
    if (badgeText && user) {
      badgeText.textContent = getPwValueFor(user.id, mode) || "--";
    }
  }

  var pwModal = document.getElementById("pwModal");

  document.getElementById("pw-mode-badge").addEventListener("click", function () {
    var user = getCurrentUser();
    var current = getCurrentPwMode() || "mode1";
    var currentText = document.getElementById("pwModalCurrent");
    if (currentText && user) {
      currentText.textContent = "現在: " + (getPwValueFor(user.id, current) || "--");
    }
    pwModal.classList.add("show");
  });

  document.getElementById("pwModalCancel").addEventListener("click", function () {
    pwModal.classList.remove("show");
  });

  document.getElementById("pwModalMode1").addEventListener("click", function () {
    setCurrentPwMode("mode1");
    updatePwBadge("mode1");
    pwModal.classList.remove("show");
  });

  document.getElementById("pwModalMode2").addEventListener("click", function () {
    setCurrentPwMode("mode2");
    updatePwBadge("mode2");
    pwModal.classList.remove("show");
  });
</script>
</body>
</html>

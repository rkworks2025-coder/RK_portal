<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#15171a">
<title>RK Works 業務ポータル</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RK Works">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="shared/modal.css">
<link rel="stylesheet" href="shared/no-zoom.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
</head>
<body>

  <div class="portal-wrap">

    <div class="portal-header">
      <img src="icons/icon-32.png" alt="RK Works">
      <div class="portal-header-text">
        <p class="portal-title">業務ポータル</p>
        <p class="portal-sub" id="portal-user-label">アプリを選択してください</p>
      </div>
      <button type="button" id="pw-mode-badge" class="portal-pw-badge">
        <i class="ti ti-key" aria-hidden="true"></i>
        <span class="portal-pw-badge-text-wrap">
          <span id="pw-mode-badge-text">PW1</span>
          <span class="portal-pw-badge-hint">タップで切替可</span>
        </span>
      </button>
    </div>

    <div class="portal-grid">

      <a href="./junkai/" class="portal-card">
        <span class="portal-card-icon icon-junkai"><i class="ti ti-map-pin" aria-hidden="true"></i></span>
        <span class="portal-card-label">巡回</span>
      </a>

      <a href="./yoyaku/" class="portal-card">
        <span class="portal-card-icon icon-yoyaku"><i class="ti ti-calendar-stats" aria-hidden="true"></i></span>
        <span class="portal-card-label">予約表示</span>
      </a>

      <a href="./jks/" id="card-jks" class="portal-card">
        <span class="portal-card-badge badge-jks">List</span>
        <span class="portal-card-icon icon-jks"><i class="ti ti-list-details" aria-hidden="true"></i></span>
        <span class="portal-card-label">JKS</span>
      </a>

      <a href="./jks2/" class="portal-card">
        <span class="portal-card-badge badge-jks2">Map</span>
        <span class="portal-card-icon icon-jks2"><i class="ti ti-map-2" aria-hidden="true"></i></span>
        <span class="portal-card-label">JKS II</span>
      </a>

      <a href="./jisseki/" class="portal-card">
        <span class="portal-card-icon icon-jisseki"><i class="ti ti-report" aria-hidden="true"></i></span>
        <span class="portal-card-label">作業実績</span>
      </a>

    </div>

  </div>

  <div id="pwModal" class="modal">
    <div class="dialog">
      <h3>PWモードの切り替え</h3>
      <p class="dialog-sub" id="pwModalCurrent">現在: モード1</p>
      <p class="dialog-msg">現在TMAログイン画面で使われているPWを選んでください</p>
      <div class="tma-confirm-actions">
        <button id="pwModalMode1" class="btn btn-ok">--</button>
        <button id="pwModalMode2" class="btn btn-ok">--</button>
      </div>
      <div class="tma-confirm-actions">
        <button id="pwModalCancel" class="btn">キャンセル</button>
      </div>
    </div>
  </div>

<script src="shared/user-context.js"></script>
<script src="shared/pw-config.js"></script>
<script>
  (function () {
    var user = getCurrentUser();
    if (!user) {
      window.location.href = "select-user.html";
      return;
    }
    var label = document.getElementById("portal-user-label");
    if (label) {
      label.textContent = user.label + "として利用中";
    }

    // JKSは片山用・戸島用でフォルダが分かれているため、
    // 担当者IDに応じてカードのリンク先を切り替える。
    var jksCard = document.getElementById("card-jks");
    if (jksCard && user.id === "tojima") {
      jksCard.setAttribute("href", "./jks/tjm/");
    }

    var mode = getCurrentPwMode();
    if (!mode) {
      window.location.href = "select-pw-mode.html";
      return;
    }
    updatePwBadge(mode);

    var btn1 = document.getElementById("pwModalMode1");
    var btn2 = document.getElementById("pwModalMode2");
    if (btn1) btn1.textContent = getPwValueFor(user.id, "mode1") || "--";
    if (btn2) btn2.textContent = getPwValueFor(user.id, "mode2") || "--";
  })();

  function updatePwBadge(mode) {
    var badgeText = document.getElementById("pw-mode-badge-text");
    var user = getCurrentUser();
    if (badgeText && user) {
      badgeText.textContent = getPwValueFor(user.id, mode) || "--";
    }
  }

  var pwModal = document.getElementById("pwModal");

  document.getElementById("pw-mode-badge").addEventListener("click", function () {
    var user = getCurrentUser();
    var current = getCurrentPwMode() || "mode1";
    var currentText = document.getElementById("pwModalCurrent");
    if (currentText && user) {
      currentText.textContent = "現在: " + (getPwValueFor(user.id, current) || "--");
    }
    pwModal.classList.add("show");
  });

  document.getElementById("pwModalCancel").addEventListener("click", function () {
    pwModal.classList.remove("show");
  });

  document.getElementById("pwModalMode1").addEventListener("click", function () {
    setCurrentPwMode("mode1");
    updatePwBadge("mode1");
    pwModal.classList.remove("show");
  });

  document.getElementById("pwModalMode2").addEventListener("click", function () {
    setCurrentPwMode("mode2");
    updatePwBadge("mode2");
    pwModal.classList.remove("show");
  });
</script>
</body>
</html>

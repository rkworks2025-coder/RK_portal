<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="巡回">
  <title>巡回リスト s10</title>
  <link rel="stylesheet" href="style.css?v=s10" />
  <link rel="stylesheet" href="../shared/no-zoom.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</head>
<body>
  <header class="appbar">
    <div class="title">巡回リスト</div>
    <div class="btns">
      <button id="syncBtn" class="btn primary">同期</button>
      <button id="pushLogBtn" class="btn primary">Pull</button>
    </div>
  </header>
  <main class="wrap">
    <div class="mode-switch-container">
      <div class="mode-switch-label">作業モード</div>
      <select id="workModeSelect" class="mode-switch-select">
        <option value="single">単独 (TMA自動)</option>
        <option value="continuous">連続 (TMA手動)</option>
      </select>
    </div>
    <p id="statusText" class="hint"></p>
    <section class="cards" id="city-list-container"></section>
    <section class="cards" style="margin-top:8px;">
      <div class="cardlink">
        <h2>全エリア</h2>
        <div class="meta">
          <span class="chip">済 <span id="all-done">0</span></span>
          <span class="chip">停 <span id="all-stop">0</span></span>
          <span class="chip">不要 <span id="all-skip">0</span></span>
          <span class="chip">総 <span id="all-total">0</span></span>
          <span class="chip">残 <span id="all-rem">0</span></span>
        </div>
      </div>
    </section>
  </main>
  <div id="progressModal" class="modal"><div class="dialog"><h3>同期中…</h3><div class="barwrap"><div id="progressBar" class="bar"></div></div></div></div>
  <script src="../shared/user-context.js"></script>
  <script src="../shared/ss-config.js"></script>
  <script src="../shared/app-menu.js"></script>
  <script src="app.js?v=s10"></script>
  <script>Junkai.initIndex();</script>
</body>
</html>

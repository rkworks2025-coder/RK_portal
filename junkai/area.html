<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="巡回">
  <title id="pageTitle">エリア詳細</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css?v=s10" />
  <link rel="stylesheet" href="../shared/no-zoom.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</head>
<body>
  
  <header class="appbar">
    <button class="btn" onclick="location.href='index.html'">← 戻る</button>
    <button id="filterBtn" class="btn">フィルタ ▼</button>
    <div class="title" id="headerTitle" style="font-size:16px;">エリア詳細</div>
  </header>

  <main class="wrap">
    <div id="hint" class="hint" style="margin-bottom:12px;">読み込み中...</div>

    <div id="list" class="list"></div>
  </main>

  <div id="filterModal" class="modal" aria-hidden="true">
    <div class="filter-dialog">
      <h3>表示する項目</h3>
      <div class="filter-options">
        <div class="filter-option">
          <input type="checkbox" id="filter_standby" />
          <label for="filter_standby">未巡回(standby)</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter_stop" />
          <label for="filter_stop">停止(stop)</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter_skip" />
          <label for="filter_skip">不要(skip)</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter_7days" />
          <label for="filter_7days">7days_rule</label>
        </div>
        <div class="filter-option">
          <input type="checkbox" id="filter_checked" />
          <label for="filter_checked">チェック済み</label>
        </div>
      </div>
      <div class="filter-actions">
        <button id="filterCancel" class="btn">キャンセル</button>
        <button id="filterApply" class="btn primary">適用</button>
      </div>
    </div>
  </div>

  <div id="tmaModal" class="modal">
    <div class="dialog">
      <h3 id="tmaModalTitle" style="margin:0 0 10px 0; font-size:18px;"></h3>
      <p id="tmaModalModel" style="margin:-5px 0 10px 0; color:var(--fg); font-size:15px; font-weight:bold;"></p>
      <p style="margin:0 0 10px 0; color:var(--muted); font-size:14px;">TMA自動入力を実行しますか？</p>
      <div class="tma-confirm-actions">
        <button id="tmaModalOk" class="btn btn-ok">OK</button>
        <button id="tmaModalCancel" class="btn">キャンセル</button>
      </div>
    </div>
  </div>

  <div id="checkModal" class="modal">
    <div class="dialog">
      <h3 id="checkModalTitle" style="margin:0 0 10px 0; font-size:18px;"></h3>
      <p id="checkModalModel" style="margin:-5px 0 10px 0; color:var(--fg); font-size:15px; font-weight:bold;"></p>
      <p id="checkModalMsg" style="margin:0 0 10px 0; color:var(--muted); font-size:14px;"></p>
      <div class="tma-confirm-actions">
        <button id="checkModalOk" class="btn btn-ok">OK</button>
        <button id="checkModalCancel" class="btn">キャンセル</button>
      </div>
    </div>
  </div>

  <div id="tireModal" class="modal">
    <div class="dialog">
      <h3 id="tireModalTitle" style="margin:0 0 10px 0; font-size:18px;"></h3>
      <p id="tireModalModel" style="margin:-5px 0 10px 0; color:var(--fg); font-size:15px; font-weight:bold;"></p>
      <p style="margin:0 0 10px 0; color:var(--muted); font-size:14px;">点検を開始しますか？</p>
      <div class="tma-confirm-actions">
        <button id="tireModalOk" class="btn btn-ok">OK</button>
        <button id="tireModalCancel" class="btn">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="../shared/user-context.js"></script>
  <script src="../shared/ss-config.js"></script>
  <script src="app.js?v=s10"></script>
  <script>
    Junkai.initAreaPage();
  </script>
  
  <div class="version-label"></div>
</body>
</html>

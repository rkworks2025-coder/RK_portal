
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#15171a">
<title>TMA</title>
<link rel="stylesheet" href="../shared/no-zoom.css">
<style>
  :root {
    --rk-bg: #15171a;
    --rk-bg-elevated: #1f2125;
    --rk-bg-header-border: rgba(255, 255, 255, 0.08);
    --rk-text-primary: #f5f5f4;
    --header-h: 52px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--rk-bg);
    overflow: hidden;
  }
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: calc(var(--header-h) + env(safe-area-inset-top, 0px));
    padding-top: env(safe-area-inset-top, 0px);
    background: var(--rk-bg-elevated);
    border-bottom: 1px solid var(--rk-bg-header-border);
    display: flex;
    align-items: center;
    padding-left: 14px;
    z-index: 1000;
  }
  .tma-title {
    font-family: "Noto Sans JP", -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--rk-text-primary);
  }
  #tmaFrame {
    position: fixed;
    top: calc(var(--header-h) + env(safe-area-inset-top, 0px));
    left: 0; right: 0; bottom: 0;
    width: 100%;
    height: calc(100% - var(--header-h) - env(safe-area-inset-top, 0px));
    border: none;
    background: #fff;
  }
</style>
</head>
<body>

<header>
  <span class="tma-title">TMA</span>
</header>

<iframe id="tmaFrame" src="https://dailycheck.tc-extsys.jp/tcrappsweb/web/tawTop.html"></iframe>

<script src="../shared/user-context.js"></script>
<script src="../shared/app-menu.js?v=1"></script>
</body>
</html>
